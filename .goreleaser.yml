version: 2

project_name: memsh

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats: [tar.gz]

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: amjadjibon
    name: memsh

homebrew_casks:
  - name: memsh
    homepage: https://github.com/amjadjibon/memsh
    description: "Virtual bash shell implemented in Go with in-memory filesystem"
    license: MIT
    skip_upload: false
    repository:
      owner: amjadjibon
      name: homebrew-memsh
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    url:
      template: "https://github.com/amjadjibon/memsh/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    generate_completions_from_executable:
      executable: "memsh"
      shell_parameter_format: cobra
