version: 2

project_name: memsh

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: amjadjibon
    name: memsh

brews:
  - name: memsh
    homepage: https://github.com/amjadjibon/memsh
    description: "Virtual bash shell implemented in Go with in-memory filesystem"
    license: MIT
    skip_upload: false
    tap:
      owner: amjadjibon
      name: homebrew-memsh
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    test: |
      system "#{bin}/memsh", "--version"
    folder: Formula
    install: |
      bin.install "memsh"
