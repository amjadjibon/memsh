<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>memsh</title>
<style>
  :root {
    --bg:      #0d1117;
    --surface: #161b22;
    --surface2:#1c2128;
    --border:  #30363d;
    --green:   #3fb950;
    --green2:  #56d364;
    --red:     #f85149;
    --yellow:  #e3b341;
    --blue:    #58a6ff;
    --purple:  #bc8cff;
    --text:    #c9d1d9;
    --dim:     #6e7681;
    --mono: 'SF Mono','Cascadia Code','Fira Code',Consolas,monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text);
    font-family: var(--mono); font-size: 13px; line-height: 1.5; }

  /* ── layout ── */
  #app {
    display: grid;
    grid-template-rows: auto 1fr auto;
    grid-template-columns: 1fr 260px;
    grid-template-areas:
      "hdr  sess"
      "main sess"
      "inp  sess";
    height: 100vh;
    padding: 12px;
    gap: 10px;
  }
  #app.sessions-hidden {
    grid-template-columns: 1fr 0;
  }

  /* ── header ── */
  #hdr {
    grid-area: hdr;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 20px 22px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  .dots { display: flex; gap: 6px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot-r { background: #ff5f57; }
  .dot-a { background: #febc2e; }
  .dot-g { background: #28c840; }

  #title { flex: 1; text-align: center; color: var(--dim); font-size: 12px; letter-spacing:.05em; }

  .hdr-right { display: flex; align-items: center; gap: 12px; }
  #sdot { width: 8px; height: 8px; border-radius: 50%; background: var(--dim); transition: background .3s; }
  #sdot.ok    { background: var(--green); box-shadow: 0 0 5px var(--green); }
  #sdot.err   { background: var(--red); }
  #sdot.busy  { background: var(--yellow); }
  #stxt { color: var(--dim); font-size: 11px; }

  #toggle-sess-btn {
    background: none; border: 1px solid var(--border); border-radius: 4px;
    padding: 3px 9px; color: var(--dim); font-family: var(--mono); font-size: 11px;
    cursor: pointer; transition: border-color .15s, color .15s;
  }
  #toggle-sess-btn:hover { border-color: var(--blue); color: var(--blue); }
  #toggle-sess-btn.active { border-color: var(--blue); color: var(--blue); }

  /* ── main output ── */
  #main {
    grid-area: main;
    overflow-y: auto;
    padding: 20px 22px;
    font-size: 13px;
    line-height: 1.6;
    word-break: break-all;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  #main::-webkit-scrollbar { width: 5px; }
  #main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .entry { margin-bottom: 2px; }
  .e-cmd { color: var(--green2); }
  .e-cmd::before { content: attr(data-prompt) ' '; color: var(--green); }
  .e-out { color: var(--text); white-space: pre-wrap; }
  .e-err { color: var(--red); white-space: pre-wrap; }
  .e-info { color: var(--dim); font-style: italic; }

  .welcome { color: var(--dim); margin-bottom: 12px;
    border-bottom: 1px solid var(--border); padding-bottom: 10px; }
  .welcome-title { color: var(--green2); font-size: 15px; font-weight: bold; margin-bottom: 2px; }

  /* ── input ── */
  #inp {
    grid-area: inp;
    display: flex;
    align-items: center;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    transition: border-color .15s;
    overflow: hidden;
  }
  #inp:focus-within { border-color: var(--green); }

  #prompt {
    padding: 14px 20px;
    color: var(--green);
    white-space: nowrap;
    flex-shrink: 0;
    -webkit-user-select: none;
    user-select: none;
    font-size: 13px;
  }
  #prompt .path { color: var(--blue); }

  #cmd {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text); font-family: var(--mono); font-size: 13px;
    padding: 14px 0; caret-color: var(--green);
    resize: none; overflow: hidden;
  }

  #run-btn {
    background: none; border: none; border-left: 1px solid var(--border);
    padding: 0 20px; align-self: stretch; color: var(--dim);
    font-family: var(--mono); font-size: 12px; cursor: pointer;
    transition: background .15s, color .15s; white-space: nowrap;
  }
  #run-btn:hover { background: var(--surface2); color: var(--green); }
  #run-btn:disabled { opacity:.4; cursor:default; }

  /* ── sessions panel ── */
  #sess {
    grid-area: sess;
    display: flex;
    flex-direction: column;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    overflow: hidden;
    min-width: 0;
  }
  #app.sessions-hidden #sess { display: none; }

  .sess-hdr {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    color: var(--dim);
    flex-shrink: 0;
  }
  .sess-hdr-title { color: var(--text); font-weight: bold; font-size: 12px; }

  .sess-actions { display: flex; gap: 6px; }

  .btn-xs {
    background: none; border: 1px solid var(--border); border-radius: 4px;
    padding: 2px 7px; color: var(--dim); font-family: var(--mono); font-size: 11px;
    cursor: pointer; transition: border-color .15s, color .15s;
  }
  .btn-xs:hover { border-color: var(--text); color: var(--text); }
  .btn-xs.primary:hover { border-color: var(--green); color: var(--green); }
  .btn-xs.danger:hover  { border-color: var(--red);   color: var(--red); }

  #sess-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px 0;
  }
  #sess-list::-webkit-scrollbar { width: 4px; }
  #sess-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .sess-item {
    padding: 7px 12px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: background .1s, border-color .1s;
  }
  .sess-item:hover { background: var(--surface2); }
  .sess-item.active { border-left-color: var(--green); background: var(--surface2); }

  .sess-id {
    font-size: 12px;
    color: var(--blue);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sess-item.active .sess-id { color: var(--green2); }

  .sess-meta {
    font-size: 10px;
    color: var(--dim);
    margin-top: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .sess-del {
    float: right;
    background: none; border: none; color: var(--dim); cursor: pointer;
    font-size: 12px; padding: 0 2px; line-height: 1;
    opacity: 0;
    transition: color .1s, opacity .1s;
  }
  .sess-item:hover .sess-del { opacity: 1; }
  .sess-del:hover { color: var(--red); }

  #sess-empty {
    padding: 16px 12px;
    color: var(--dim);
    font-size: 11px;
    font-style: italic;
  }

  /* current session input strip */
  .sess-current {
    padding: 8px 12px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .sess-current label { font-size: 10px; color: var(--dim); display: block; margin-bottom: 3px; }
  #sess-id-input,
  #api-key-input {
    width: 100%;
    background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
    padding: 4px 7px; color: var(--blue); font-family: var(--mono); font-size: 11px;
  }
  #sess-id-input:focus,
  #api-key-input:focus { outline: 1px solid var(--blue); }

  /* spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin {
    display: inline-block; width: 10px; height: 10px;
    border: 2px solid var(--border); border-top-color: var(--yellow);
    border-radius: 50%; animation: spin .7s linear infinite;
    vertical-align: middle; margin-right: 4px;
  }

  /* ── pager overlay ── */
  #pager {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 200;
    flex-direction: column;
  }
  #pager.active { display: flex; }

  #pager-viewport {
    flex: 1;
    overflow: hidden;
    position: relative;
    padding: 8px 0;
  }

  #pager-lines {
    position: absolute;
    top: 8px; left: 0; right: 0;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.5;
  }

  .pager-line {
    display: flex;
    white-space: pre;
    padding: 0 22px;
    min-height: 1.5em;
  }
  .pager-line:hover { background: var(--surface2); }

  .pager-ln {
    color: var(--dim);
    min-width: 4ch;
    margin-right: 12px;
    text-align: right;
    flex-shrink: 0;
    user-select: none;
  }

  .pager-text {
    color: var(--text);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* search highlight */
  .pager-match { background: #e3b34155; color: var(--yellow); border-radius: 2px; }
  .pager-match.current { background: var(--yellow); color: var(--bg); }

  #pager-status {
    flex-shrink: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 7px 22px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--dim);
    display: flex;
    align-items: center;
    gap: 16px;
    min-height: 32px;
  }

  #pager-pos   { color: var(--text); font-weight: bold; }
  #pager-keys  { flex: 1; }
  #pager-search-box {
    display: none;
    align-items: center;
    gap: 6px;
    flex: 1;
  }
  #pager-search-box.active { display: flex; }
  #pager-search-input {
    background: var(--bg); border: 1px solid var(--green); border-radius: 4px;
    padding: 2px 8px; color: var(--text); font-family: var(--mono); font-size: 12px;
    outline: none; width: 220px;
  }
  #pager-search-label { color: var(--green); }
  #pager-search-count { color: var(--dim); font-size: 11px; }

  /* ── tab completion dropdown ── */
  #completion-dropdown {
    position: fixed;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    max-height: 220px;
    overflow-y: auto;
    z-index: 100;
    box-shadow: 0 -4px 16px rgba(0,0,0,.5);
    min-width: 160px;
  }
  #completion-dropdown::-webkit-scrollbar { width: 4px; }
  #completion-dropdown::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .completion-item {
    padding: 5px 14px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .completion-item:hover { background: var(--surface); color: var(--blue); }
  .completion-item.completion-active { background: var(--surface); color: var(--green2); }
</style>
</head>
<body>
<div id="app">

  <!-- header -->
  <header id="hdr">
    <div class="dots">
      <div class="dot dot-r"></div>
      <div class="dot dot-a"></div>
      <div class="dot dot-g"></div>
    </div>
    <span id="title">memsh</span>
    <div class="hdr-right">
      <div id="sdot"></div>
      <span id="stxt">connecting…</span>
      <button type="button" id="toggle-sess-btn">sessions ▸</button>
    </div>
  </header>

  <!-- output -->
  <main id="main">
    <div class="welcome">
      <div class="welcome-title">memsh</div>
      <div>virtual sandboxed shell &nbsp;·&nbsp; Enter to run &nbsp;·&nbsp; Shift+Enter newline &nbsp;·&nbsp; Tab complete &nbsp;·&nbsp; ↑↓ history &nbsp;·&nbsp; Ctrl+L clear</div>
    </div>
  </main>

  <!-- input -->
  <div id="inp">
    <span id="prompt"><span class="path">/</span> $</span>
    <textarea id="cmd" rows="1" autocomplete="off" autocorrect="off"
      spellcheck="false" placeholder="type a command…"></textarea>
    <button type="button" id="run-btn">run ↵</button>
  </div>

  <!-- sessions panel -->
  <aside id="sess">
    <div class="sess-hdr">
      <span class="sess-hdr-title">Sessions</span>
      <div class="sess-actions">
        <button type="button" class="btn-xs primary" id="new-sess-btn">+ new</button>
        <button type="button" class="btn-xs danger"  id="del-all-btn">clear all</button>
      </div>
    </div>
    <div id="sess-list">
      <div id="sess-empty">no sessions yet</div>
    </div>
    <div class="sess-current">
      <label for="api-key-input">api key</label>
      <input id="api-key-input" type="password" spellcheck="false" placeholder="paste API key…">
    </div>
    <div class="sess-current">
      <label for="sess-id-input">active session id</label>
      <input id="sess-id-input" type="text" spellcheck="false" placeholder="none (stateless)">
    </div>
  </aside>

</div>

<!-- pager overlay (outside #app so it covers everything) -->
<div id="pager" role="dialog" aria-modal="true" aria-label="pager">
  <div id="pager-viewport">
    <div id="pager-lines"></div>
  </div>
  <div id="pager-status">
    <span id="pager-pos"></span>
    <span id="pager-keys">j/k scroll &nbsp;·&nbsp; Space/b page &nbsp;·&nbsp; g/G top/bottom &nbsp;·&nbsp; / search &nbsp;·&nbsp; n/N next/prev &nbsp;·&nbsp; q quit</span>
    <div id="pager-search-box">
      <span id="pager-search-label">/</span>
      <input id="pager-search-input" type="text" autocomplete="off" spellcheck="false" placeholder="search…">
      <span id="pager-search-count"></span>
    </div>
  </div>
</div>

<script>
// ── elements ──────────────────────────────────────────────────────────────────
const app         = document.getElementById('app');
const mainEl      = document.getElementById('main');
const pagerEl     = document.getElementById('pager');
const pagerLinesEl= document.getElementById('pager-lines');
const pagerPosEl  = document.getElementById('pager-pos');
const pagerSearchBox   = document.getElementById('pager-search-box');
const pagerSearchInput = document.getElementById('pager-search-input');
const pagerSearchCount = document.getElementById('pager-search-count');
const cmdEl     = document.getElementById('cmd');
const runBtn    = document.getElementById('run-btn');
const promptEl  = document.getElementById('prompt');
const sdot      = document.getElementById('sdot');
const stxt      = document.getElementById('stxt');
const toggleBtn = document.getElementById('toggle-sess-btn');
const sessList  = document.getElementById('sess-list');
const sessEmpty = document.getElementById('sess-empty');
const newSessBtn  = document.getElementById('new-sess-btn');
const delAllBtn   = document.getElementById('del-all-btn');
const sessIdInput = document.getElementById('sess-id-input');
const apiKeyInput = document.getElementById('api-key-input');

// ── state ─────────────────────────────────────────────────────────────────────
const hist = [];
let histIdx = -1, savedInput = '';
let sessionsOpen = false;
let sessRefreshTimer = null;

// Tab-completion state
let completionState = null; // {prefix, afterCursor, items, index}

// Restore or create session ID (persists across page reloads)
let currentSession = sessionStorage.getItem('memsh-session') || randomId();
sessionStorage.setItem('memsh-session', currentSession);
sessIdInput.value = currentSession;

// Restore API key from sessionStorage.
let apiKey = sessionStorage.getItem('memsh-api-key') || '';
apiKeyInput.value = apiKey;

function saveApiKey(showMsg) {
  apiKey = apiKeyInput.value.trim();
  if (apiKey) {
    sessionStorage.setItem('memsh-api-key', apiKey);
    if (showMsg) appendInfo('api key saved');
  } else {
    sessionStorage.removeItem('memsh-api-key');
  }
}

apiKeyInput.addEventListener('input', () => saveApiKey(false));
apiKeyInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.preventDefault();
    saveApiKey(true);
    cmdEl.focus();
  }
});

// Helper: build headers with optional auth and session.
function authHeaders(extra) {
  const h = Object.assign({}, extra || {});
  if (apiKey) h['Authorization'] = 'Bearer ' + apiKey;
  return h;
}

// ── sessions panel toggle ─────────────────────────────────────────────────────
toggleBtn.addEventListener('click', () => {
  sessionsOpen = !sessionsOpen;
  app.classList.toggle('sessions-hidden', !sessionsOpen);
  toggleBtn.classList.toggle('active', sessionsOpen);
  toggleBtn.textContent = sessionsOpen ? 'sessions ▾' : 'sessions ▸';
  if (sessionsOpen) {
    refreshSessions();
    sessRefreshTimer = setInterval(refreshSessions, 3000);
  } else {
    clearInterval(sessRefreshTimer);
  }
});

// Start with panel hidden
app.classList.add('sessions-hidden');

// ── session input ──────────────────────────────────────────────────────────────
sessIdInput.addEventListener('change', () => {
  const v = sessIdInput.value.trim();
  currentSession = v || null;
  if (v) sessionStorage.setItem('memsh-session', v);
  else sessionStorage.removeItem('memsh-session');
  updatePrompt('/');
  refreshSessions();
});

newSessBtn.addEventListener('click', () => {
  currentSession = randomId();
  sessIdInput.value = currentSession;
  sessionStorage.setItem('memsh-session', currentSession);
  clearTerminal();
  updatePrompt('/');
  appendInfo(`session: ${currentSession}`);
  refreshSessions();
});

delAllBtn.addEventListener('click', async () => {
  const sessions = await fetchSessions();
  await Promise.all(sessions.map(s => deleteSession(s.id)));
  currentSession = randomId();
  sessIdInput.value = currentSession;
  sessionStorage.setItem('memsh-session', currentSession);
  updatePrompt('/');
  appendInfo('all sessions cleared, new session started');
  refreshSessions();
});

// ── sessions list ─────────────────────────────────────────────────────────────
async function fetchSessions() {
  try {
    const r = await fetch('/sessions', { headers: authHeaders() });
    if (!r.ok) return [];
    return await r.json();
  } catch { return []; }
}

async function deleteSession(id) {
  try {
    await fetch(`/session/${encodeURIComponent(id)}`, { method: 'DELETE', headers: authHeaders() });
  } catch { /* ignore */ }
}

async function refreshSessions() {
  const sessions = await fetchSessions();
  renderSessions(sessions);
}

function renderSessions(sessions) {
  if (!sessions || sessions.length === 0) {
    sessList.innerHTML = '';
    sessList.appendChild(sessEmpty);
    return;
  }
  sessList.innerHTML = '';
  sessions.forEach(s => {
    const item = document.createElement('div');
    item.className = 'sess-item' + (s.id === currentSession ? ' active' : '');
    item.dataset.id = s.id;

    const del = document.createElement('button');
    del.type = 'button';
    del.className = 'sess-del';
    del.title = 'delete session';
    del.textContent = '×';
    del.addEventListener('click', async e => {
      e.stopPropagation();
      await deleteSession(s.id);
      if (s.id === currentSession) {
        currentSession = randomId();
        sessIdInput.value = currentSession;
        sessionStorage.setItem('memsh-session', currentSession);
        updatePrompt('/');
        appendInfo(`session deleted, new session: ${currentSession}`);
      }
      refreshSessions();
    });

    const idEl = document.createElement('div');
    idEl.className = 'sess-id';
    idEl.textContent = s.id;

    const metaEl = document.createElement('div');
    metaEl.className = 'sess-meta';
    metaEl.textContent = `${s.cwd}  ·  ${timeAgo(s.last_use)}`;

    item.appendChild(del);
    item.appendChild(idEl);
    item.appendChild(metaEl);

    item.addEventListener('click', () => {
      currentSession = s.id;
      sessIdInput.value = s.id;
      sessionStorage.setItem('memsh-session', s.id);
      clearTerminal();
      updatePrompt(s.cwd);
      appendInfo(`session: ${s.id}  (${s.cwd})`);
      renderSessions(sessions); // re-render to update active
      cmdEl.focus();
    });

    sessList.appendChild(item);
  });
}

// ── health ────────────────────────────────────────────────────────────────────
async function checkHealth() {
  try {
    const r = await fetch('/health');
    if (!r.ok) { setStatus('err', 'server error'); return; }
    const d = await r.json();
    setStatus('ok', `ok · ${d.uptime} · ${d.sessions} session${d.sessions !== 1 ? 's' : ''}`);
  } catch {
    setStatus('err', 'unreachable');
  }
}
function setStatus(state, text) { sdot.className = state; stxt.textContent = text; }

checkHealth();
setInterval(checkHealth, 10000);

// ── prompt ────────────────────────────────────────────────────────────────────
function updatePrompt(cwd) {
  promptEl.innerHTML = `<span class="path">${esc(cwd)}</span> $`;
}

// ── pager ─────────────────────────────────────────────────────────────────────
let pagerLines   = [];   // raw line strings
let pagerTop     = 0;    // index of topmost visible line
let pagerPageH   = 24;   // visible lines (recalculated on open/resize)
let pagerNumbers = true; // show line numbers
let pagerSearch  = '';   // current search pattern
let pagerMatches = [];   // array of line indices that match
let pagerMatchIdx = -1;  // current match index (for n/N)
let pagerSearchMode = false;

function pagerLineHeight() {
  // compute actual rendered line height from a sample element
  const tmp = document.createElement('div');
  tmp.className = 'pager-line';
  tmp.style.visibility = 'hidden';
  tmp.textContent = 'x';
  pagerLinesEl.appendChild(tmp);
  const h = tmp.getBoundingClientRect().height || 19.5;
  pagerLinesEl.removeChild(tmp);
  return h;
}

function pagerRecalcHeight() {
  const vpH = pagerEl.querySelector('#pager-viewport').clientHeight - 16; // 8px top+bottom padding
  const lh = pagerLineHeight();
  pagerPageH = Math.max(1, Math.floor(vpH / lh));
}

function openPager(content, startLine, showNumbers) {
  pagerLines = content.split('\n');
  // trim trailing empty line that split produces for a trailing newline
  if (pagerLines.length && pagerLines[pagerLines.length - 1] === '') pagerLines.pop();
  pagerNumbers = showNumbers !== false;
  pagerSearch  = '';
  pagerMatches = [];
  pagerMatchIdx = -1;
  pagerSearchMode = false;
  pagerSearchBox.classList.remove('active');
  pagerSearchInput.value = '';
  pagerSearchCount.textContent = '';

  pagerEl.classList.add('active');
  pagerRecalcHeight();
  pagerTop = Math.min(startLine || 0, Math.max(0, pagerLines.length - pagerPageH));
  renderPager();
  document.addEventListener('keydown', pagerKeydown, true);
}

function closePager() {
  pagerEl.classList.remove('active');
  document.removeEventListener('keydown', pagerKeydown, true);
  pagerSearchMode = false;
  cmdEl.focus();
}

function clampTop(v) {
  return Math.max(0, Math.min(v, Math.max(0, pagerLines.length - pagerPageH)));
}

function renderPager() {
  const visible = pagerLines.slice(pagerTop, pagerTop + pagerPageH);
  const lnWidth = String(pagerLines.length).length;
  const frag = document.createDocumentFragment();

  visible.forEach((raw, i) => {
    const absIdx = pagerTop + i;
    const row = document.createElement('div');
    row.className = 'pager-line';

    if (pagerNumbers) {
      const ln = document.createElement('span');
      ln.className = 'pager-ln';
      ln.textContent = String(absIdx + 1).padStart(lnWidth, ' ');
      row.appendChild(ln);
    }

    const txt = document.createElement('span');
    txt.className = 'pager-text';

    if (pagerSearch) {
      txt.innerHTML = highlightLine(raw, pagerSearch, pagerMatches.indexOf(absIdx) >= 0 && absIdx === (pagerMatches[pagerMatchIdx] ?? -1));
    } else {
      txt.textContent = raw;
    }
    row.appendChild(txt);
    frag.appendChild(row);
  });

  pagerLinesEl.innerHTML = '';
  pagerLinesEl.appendChild(frag);

  const end = Math.min(pagerTop + pagerPageH, pagerLines.length);
  const pct = pagerLines.length ? Math.round(end / pagerLines.length * 100) : 100;
  const matchInfo = pagerSearch && pagerMatches.length
    ? ` · match ${pagerMatchIdx + 1}/${pagerMatches.length}`
    : '';
  pagerPosEl.textContent = `lines ${pagerTop + 1}–${end} / ${pagerLines.length} (${pct}%)${matchInfo}`;
}

function highlightLine(text, pattern, isCurrent) {
  if (!pattern) return esc(text);
  try {
    const re = new RegExp(pattern.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
    return esc(text).replace(re.source ? new RegExp(esc(pattern).replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi') : re,
      m => `<span class="pager-match${isCurrent ? ' current' : ''}">${m}</span>`
    );
  } catch { return esc(text); }
}

function pagerRunSearch(pattern) {
  pagerSearch  = pattern;
  pagerMatches = [];
  pagerMatchIdx = -1;
  if (!pattern) { renderPager(); return; }
  try {
    const re = new RegExp(pattern.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'i');
    pagerLines.forEach((l, i) => { if (re.test(l)) pagerMatches.push(i); });
  } catch { /* bad pattern */ }
  if (pagerMatches.length) {
    // jump to first match at or after current top
    pagerMatchIdx = pagerMatches.findIndex(i => i >= pagerTop);
    if (pagerMatchIdx < 0) pagerMatchIdx = 0;
    pagerTop = clampTop(pagerMatches[pagerMatchIdx]);
  }
  pagerSearchCount.textContent = pagerMatches.length
    ? `${pagerMatchIdx + 1}/${pagerMatches.length}`
    : 'no matches';
  renderPager();
}

function pagerNextMatch(dir) {
  if (!pagerMatches.length) return;
  pagerMatchIdx = (pagerMatchIdx + dir + pagerMatches.length) % pagerMatches.length;
  pagerTop = clampTop(pagerMatches[pagerMatchIdx]);
  pagerSearchCount.textContent = `${pagerMatchIdx + 1}/${pagerMatches.length}`;
  renderPager();
}

function pagerKeydown(e) {
  if (pagerSearchMode) {
    if (e.key === 'Enter') {
      e.preventDefault(); e.stopPropagation();
      pagerSearchMode = false;
      pagerSearchBox.classList.remove('active');
      pagerSearchInput.blur();
      pagerRunSearch(pagerSearchInput.value.trim());
    } else if (e.key === 'Escape') {
      e.preventDefault(); e.stopPropagation();
      pagerSearchMode = false;
      pagerSearchBox.classList.remove('active');
      pagerSearchInput.blur();
      pagerSearch = '';
      pagerMatches = [];
      pagerMatchIdx = -1;
      renderPager();
    }
    return; // let input handle other keys
  }

  switch (e.key) {
  case 'j': case 'ArrowDown':
    e.preventDefault(); e.stopPropagation();
    pagerTop = clampTop(pagerTop + 1); renderPager(); break;
  case 'k': case 'ArrowUp':
    e.preventDefault(); e.stopPropagation();
    pagerTop = clampTop(pagerTop - 1); renderPager(); break;
  case 'd':
    if (!e.ctrlKey) break;
    /* fall through */
  case ' ': case 'PageDown': case 'f':
    e.preventDefault(); e.stopPropagation();
    pagerTop = clampTop(pagerTop + pagerPageH); renderPager(); break;
  case 'u':
    if (!e.ctrlKey) break;
    /* fall through */
  case 'b': case 'PageUp':
    e.preventDefault(); e.stopPropagation();
    pagerTop = clampTop(pagerTop - pagerPageH); renderPager(); break;
  case 'g': case 'Home':
    e.preventDefault(); e.stopPropagation();
    pagerTop = 0; renderPager(); break;
  case 'G': case 'End':
    e.preventDefault(); e.stopPropagation();
    pagerTop = clampTop(pagerLines.length); renderPager(); break;
  case '/':
    e.preventDefault(); e.stopPropagation();
    pagerSearchMode = true;
    pagerSearchBox.classList.add('active');
    pagerSearchInput.value = '';
    pagerSearchCount.textContent = '';
    pagerSearchInput.focus();
    break;
  case 'n':
    e.preventDefault(); e.stopPropagation();
    pagerNextMatch(1); break;
  case 'N':
    e.preventDefault(); e.stopPropagation();
    pagerNextMatch(-1); break;
  case 'q': case 'Q': case 'Escape':
    e.preventDefault(); e.stopPropagation();
    closePager(); break;
  }
}

window.addEventListener('resize', () => {
  if (pagerEl.classList.contains('active')) {
    pagerRecalcHeight();
    pagerTop = clampTop(pagerTop);
    renderPager();
  }
});

// ── run ───────────────────────────────────────────────────────────────────────
async function run() {
  const script = cmdEl.value;
  if (!script.trim()) return;

  // Handle clear/reset client-side.
  const trimmed = script.trim();
  if (trimmed === 'clear' || trimmed === 'reset') {
    cmdEl.value = '';
    resize();
    clearTerminal();
    return;
  }

  if (hist[0] !== script) hist.unshift(script);
  if (hist.length > 500) hist.pop();
  histIdx = -1; savedInput = '';

  const promptText = promptEl.textContent;
  appendCmd(script, promptText);

  cmdEl.value = '';
  resize();
  runBtn.disabled = true;
  cmdEl.disabled  = true;
  setStatus('busy', 'running…');

  const headers = authHeaders({ 'Content-Type': 'application/json' });
  if (currentSession) headers['X-Session-ID'] = currentSession;

  try {
    const r = await fetch('/run', {
      method: 'POST',
      headers,
      body: JSON.stringify({ script }),
    });
    const d = await r.json();
    if (d.pager && d.output) {
      // parse sentinel metadata line: first line is JSON, rest is content
      const nl = d.output.indexOf('\n');
      let startLine = 0, showNumbers = true, content = d.output;
      if (nl >= 0) {
        try {
          const meta = JSON.parse(d.output.slice(0, nl));
          startLine   = meta.start   ?? 0;
          showNumbers = meta.numbers ?? true;
        } catch { /* ignore bad metadata */ }
        content = d.output.slice(nl + 1);
      }
      openPager(content, startLine, showNumbers);
    } else {
      if (d.output) appendOut(d.output);
    }
    if (d.error)  appendErr(d.error);
    if (d.cwd)    updatePrompt(d.cwd);
  } catch (e) {
    appendErr('network error: ' + e.message);
  }

  runBtn.disabled = false;
  cmdEl.disabled  = false;
  cmdEl.focus();
  checkHealth();
  if (sessionsOpen) refreshSessions();
}

// ── output helpers ────────────────────────────────────────────────────────────
function appendCmd(text, prompt) {
  const el = document.createElement('div');
  el.className = 'entry e-cmd';
  el.dataset.prompt = prompt;
  el.textContent = text;
  mainEl.appendChild(el);
  scrollBottom();
}
function appendOut(text) {
  const el = document.createElement('div');
  el.className = 'entry e-out';
  el.textContent = text;
  mainEl.appendChild(el);
  scrollBottom();
}
function appendErr(text) {
  const el = document.createElement('div');
  el.className = 'entry e-err';
  el.textContent = text;
  mainEl.appendChild(el);
  scrollBottom();
}
function appendInfo(text) {
  const el = document.createElement('div');
  el.className = 'entry e-info';
  el.textContent = '→ ' + text;
  mainEl.appendChild(el);
  scrollBottom();
}
function scrollBottom() { mainEl.scrollTop = mainEl.scrollHeight; }

// ── textarea resize ───────────────────────────────────────────────────────────
function resize() {
  cmdEl.style.height = 'auto';
  cmdEl.style.height = Math.min(cmdEl.scrollHeight, 160) + 'px';
}
cmdEl.addEventListener('input', () => { resize(); hideCompletion(); });

// ── tab completion ─────────────────────────────────────────────────────────────
async function triggerComplete() {
  const input  = cmdEl.value;
  const cursor = cmdEl.selectionStart ?? input.length;
  const headers = {'Content-Type': 'application/json'};
  if (apiKey) headers['Authorization'] = 'Bearer ' + apiKey;
  if (currentSession) headers['X-Session-ID'] = currentSession;
  try {
    const resp = await fetch('/complete', {
      method: 'POST', headers,
      body: JSON.stringify({input, cursor})
    });
    if (!resp.ok) return;
    const data = await resp.json();
    handleCompletions(data, input, cursor);
  } catch (_) {}
}

function handleCompletions({completions, prefix}, input, cursor) {
  if (!completions || completions.length === 0) return;
  const afterCursor = input.slice(cursor);
  if (completions.length === 1) {
    applyCompletion(completions[0], prefix, afterCursor);
    return;
  }
  completionState = {prefix, afterCursor, items: completions, index: -1};
  renderCompletion();
}

function applyCompletion(item, prefix, afterCursor) {
  const value = prefix + item + afterCursor;
  cmdEl.value = value;
  const pos = (prefix + item).length;
  cmdEl.selectionStart = cmdEl.selectionEnd = pos;
  resize();
  hideCompletion();
}

function renderCompletion() {
  hideCompletion();
  if (!completionState) return;
  const {items, index} = completionState;

  const dropdown = document.createElement('div');
  dropdown.id = 'completion-dropdown';
  items.forEach((item, i) => {
    const el = document.createElement('div');
    el.className = 'completion-item' + (i === index ? ' completion-active' : '');
    el.textContent = item;
    el.addEventListener('mousedown', ev => { ev.preventDefault(); selectCompletion(i); });
    dropdown.appendChild(el);
  });

  // Position above the input bar
  const inpRect = document.getElementById('inp').getBoundingClientRect();
  dropdown.style.left   = (inpRect.left + 10) + 'px';
  dropdown.style.bottom = (window.innerHeight - inpRect.top + 6) + 'px';
  dropdown.style.maxWidth = (inpRect.width - 20) + 'px';
  document.body.appendChild(dropdown);

  // Scroll active item into view
  if (index >= 0) {
    dropdown.querySelectorAll('.completion-item')[index]?.scrollIntoView({block:'nearest'});
  }
}

function hideCompletion() {
  document.getElementById('completion-dropdown')?.remove();
  completionState = null;
}

function selectCompletion(i) {
  if (!completionState) return;
  applyCompletion(completionState.items[i], completionState.prefix, completionState.afterCursor);
}

// ── keyboard ──────────────────────────────────────────────────────────────────
cmdEl.addEventListener('keydown', e => {
  // Tab: trigger or navigate completion
  if (e.key === 'Tab') {
    e.preventDefault();
    if (completionState) {
      const n = completionState.items.length;
      completionState.index = e.shiftKey
        ? ((completionState.index - 1) + n) % n
        : (completionState.index + 1) % n;
      renderCompletion();
      // Preview highlighted item in input without dismissing dropdown
      const {prefix, afterCursor, items, index} = completionState;
      cmdEl.value = prefix + items[index] + afterCursor;
      cmdEl.selectionStart = cmdEl.selectionEnd = (prefix + items[index]).length;
      resize();
    } else {
      triggerComplete();
    }
    return;
  }
  // Escape: close completion dropdown
  if (e.key === 'Escape' && completionState) {
    hideCompletion(); return;
  }
  // Enter: if item is highlighted in dropdown, apply it; else run command
  if (e.key === 'Enter' && !e.shiftKey) {
    if (completionState && completionState.index >= 0) {
      e.preventDefault();
      selectCompletion(completionState.index);
      return;
    }
    e.preventDefault(); run(); return;
  }
  if (e.key === 'l' && e.ctrlKey) {
    e.preventDefault();
    clearTerminal();
    return;
  }
  if (e.key === 'ArrowUp' && !e.shiftKey) {
    if (completionState) { hideCompletion(); }
    if (!hist.length) return;
    e.preventDefault();
    if (histIdx === -1) savedInput = cmdEl.value;
    histIdx = Math.min(histIdx + 1, hist.length - 1);
    cmdEl.value = hist[histIdx]; resize();
    setTimeout(() => { cmdEl.selectionStart = cmdEl.selectionEnd = cmdEl.value.length; }, 0);
    return;
  }
  if (e.key === 'ArrowDown' && !e.shiftKey) {
    if (completionState) { hideCompletion(); }
    e.preventDefault();
    if (histIdx <= 0) { histIdx = -1; cmdEl.value = savedInput; }
    else { histIdx--; cmdEl.value = hist[histIdx]; }
    resize(); return;
  }
});

runBtn.addEventListener('click', run);

// ── utils ─────────────────────────────────────────────────────────────────────
function clearTerminal() {
  mainEl.querySelectorAll('.entry').forEach(el => el.remove());
}
function randomId() {
  return [...crypto.getRandomValues(new Uint8Array(8))]
    .map(b => b.toString(16).padStart(2, '0')).join('');
}
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function timeAgo(iso) {
  const d = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (d < 5)  return 'just now';
  if (d < 60) return `${d}s ago`;
  if (d < 3600) return `${Math.floor(d/60)}m ago`;
  return `${Math.floor(d/3600)}h ago`;
}

// ── init ──────────────────────────────────────────────────────────────────────
appendInfo(`session: ${currentSession}`);
cmdEl.focus();
</script>
</body>
</html>
