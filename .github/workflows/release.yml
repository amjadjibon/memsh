name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    # macos-latest: goreleaser ad-hoc codesigns the darwin binaries via the
    # `codesign` tool, which only exists on macOS runners.
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          # A classic PAT with repo scope on amjadjibon/homebrew-memsh is
          # required for the homebrew_casks push; falls back to the default
          # token (release creation on this repo still works, cask push
          # will fail) if the secret isn't configured.
          GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
